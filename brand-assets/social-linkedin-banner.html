<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Expert Hub — LinkedIn Banner 1584×396</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1584px; height: 396px; overflow: hidden; }

  .banner {
    width: 1584px;
    height: 396px;
    background: #0b0f0c;
    position: relative;
    overflow: hidden;
    font-family: 'Bricolage Grotesque', sans-serif;
    display: flex;
    align-items: center;
  }

  /* Grid */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,242,80,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,242,80,0.05) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Diagonal lime band */
  .diagonal {
    position: absolute;
    width: 800px;
    height: 800px;
    background: linear-gradient(135deg, rgba(200,242,80,0.07) 0%, transparent 50%);
    right: -200px;
    top: -200px;
    transform: rotate(0deg);
  }

  /* Lime shape */
  .lime-shape {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 520px;
    background: linear-gradient(135deg, #1a2e1f 0%, #0b0f0c 100%);
    clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
  }

  .lime-shape-inner {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 500px;
    background: linear-gradient(160deg, rgba(200,242,80,0.08) 0%, rgba(26,46,31,0.5) 100%);
    clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
  }

  /* Glow */
  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(200,242,80,0.08) 0%, transparent 65%);
    right: 0;
    top: -100px;
    border-radius: 50%;
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0 100px;
  }

  .left { max-width: 700px; }

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .eyebrow-line {
    width: 30px;
    height: 2px;
    background: #c8f250;
  }

  .eyebrow-text {
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #c8f250;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  h1 {
    font-size: 52px;
    font-weight: 800;
    color: #f3f0e8;
    line-height: 1.05;
    letter-spacing: -0.03em;
  }

  h1 .accent {
    color: #c8f250;
    font-style: italic;
  }

  .sub {
    margin-top: 14px;
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 15px;
    color: rgba(243,240,232,0.55);
    line-height: 1.6;
  }

  /* Right column */
  .right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 28px;
  }

  .logo-badge {
    background: rgba(243,240,232,0.06);
    border: 1px solid rgba(243,240,232,0.12);
    border-radius: 20px;
    padding: 20px 28px;
  }

  .logo-badge img {
    height: 44px;
    display: block;
  }

  .metrics {
    display: flex;
    gap: 32px;
  }

  .metric {
    text-align: center;
  }

  .metric-n {
    display: block;
    font-size: 30px;
    font-weight: 800;
    color: #c8f250;
    line-height: 1;
  }

  .metric-l {
    display: block;
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 500;
    color: rgba(243,240,232,0.45);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  .metric-divider {
    width: 1px;
    background: rgba(243,240,232,0.1);
    align-self: stretch;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 11px 22px;
    background: #c8f250;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 700;
    color: #0b0f0c;
  }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 11px 22px;
    border: 1px solid rgba(243,240,232,0.2);
    border-radius: 100px;
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: rgba(243,240,232,0.7);
  }

  /* Bottom accent */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #c8f250 0%, #a7d92c 40%, transparent 100%);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="grid-bg"></div>
  <div class="diagonal"></div>
  <div class="lime-shape"></div>
  <div class="lime-shape-inner"></div>
  <div class="glow"></div>

  <div class="content">
    <div class="left">
      <div class="eyebrow">
        <div class="eyebrow-line"></div>
        <span class="eyebrow-text">Digital Marketing Agency · India</span>
      </div>
      <h1>Grow Your Business<br>with <span class="accent">Digital</span> Expertise</h1>
      <p class="sub">SEO · Google Ads · Social Media Marketing · Web Design<br>Helping Indian businesses rank, grow and scale online since 2017.</p>
    </div>

    <div class="right">
      <div class="logo-badge">
        <img src="../public/logo.png" alt="Digital Expert Hub">
      </div>
      <div class="metrics">
        <div class="metric">
          <span class="metric-n">1,000+</span>
          <span class="metric-l">Clients</span>
        </div>
        <div class="metric-divider"></div>
        <div class="metric">
          <span class="metric-n">7+</span>
          <span class="metric-l">Years</span>
        </div>
        <div class="metric-divider"></div>
        <div class="metric">
          <span class="metric-n">4.9★</span>
          <span class="metric-l">Rating</span>
        </div>
      </div>
      <div class="btn-row">
        <div class="btn-primary">Get Free Audit →</div>
        <div class="btn-ghost">digitalexperthub.com</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar"></div>
</div>
</body>
</html>
